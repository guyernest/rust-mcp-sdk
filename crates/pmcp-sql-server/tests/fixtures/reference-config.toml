# SQL Reference Server Configuration
# This is the reference MCP server for SQL databases that:
# 1. Connects to a demo Chinook SQLite database (digital media store)
# 2. Creates the shared policy store for all SQL servers
# 3. Demonstrates the Pareto principle: ~20% tools, ~80% via Code Mode

[server]
id = "sql-reference"
name = "SQL Reference Server"
description = "Reference SQL MCP Server with Demo Chinook Database and Code Mode"
version = "1.0.0"
type = "sql-api"

# This is the reference server that creates shared infrastructure
is_reference = true

# =============================================================================
# Display Metadata (defaults for admin-configurable fields)
# =============================================================================
# These values populate the server record on first deploy or after deletion.
# Admin edits via UI always take priority over these defaults.

[metadata]
display_name = "SQL Reference"
short_description = "Reference SQL MCP Server with demo Chinook database"
description = "Reference SQL MCP Server with Demo Chinook Database and Code Mode. Demonstrates SQL query generation against a digital media store dataset."
tags = ["reference", "sql", "database", "demo"]
author = "pmcp.run"
visibility = "public"

[database]
# SQLite database for the demo
type = "sqlite"
# Path for Lambda deployment - assets are bundled to /var/task/assets/
# For local development, download chinook.db to the reference folder:
#   curl -L https://github.com/lerocha/chinook-database/raw/master/ChinookDatabase/DataSources/Chinook_Sqlite.sqlite -o chinook.db
file_path = "/var/task/assets/chinook.db"

[database.pool]
# SQLite-specific settings
max_connections = 5
connection_timeout_seconds = 30

# Table definitions for Code Mode availableOperations
# These populate the management UI allowlist/blocklist checkboxes

[[database.tables]]
name = "Artist"
description = "Music artists in the catalog"

[[database.tables]]
name = "Album"
description = "Albums released by artists"

[[database.tables]]
name = "Track"
description = "Individual tracks on albums with pricing"

[[database.tables]]
name = "Genre"
description = "Music genres (Rock, Jazz, Classical, etc.)"

[[database.tables]]
name = "MediaType"
description = "Media formats (MP3, AAC, MPEG, etc.)"

[[database.tables]]
name = "Playlist"
description = "User-created playlists"

[[database.tables]]
name = "PlaylistTrack"
description = "Junction table linking playlists to tracks"

[[database.tables]]
name = "Customer"
description = "Customer information (contains PII)"

[[database.tables]]
name = "Employee"
description = "Employee information (contains PII)"

[[database.tables]]
name = "Invoice"
description = "Customer invoices and billing"

[[database.tables]]
name = "InvoiceLine"
description = "Individual line items on invoices"

[code_mode]
# Enable Code Mode for this server - handles ~80% of operations
enabled = true

# Allow writes for demo purposes (inserts/updates only)
allow_writes = true
allow_deletes = false
allow_ddl = false

# Require LIMIT on SELECT queries for safety
require_limit = true
max_limit = 1000

# Tables to exclude from Code Mode (none - all tables accessible)
blocked_tables = []

# Sensitive columns that require elevated permissions
# Code Mode will warn when these are accessed
sensitive_columns = ["Password", "Phone", "Address", "Email", "PostalCode"]

# Risk levels for auto-approval
auto_approve_levels = ["low"]

# Token settings
token_ttl_seconds = 300

# Secret for HMAC signing (resolved from Secrets Manager)
token_secret = "${CODE_MODE_SECRET}"

# Complexity limits
[code_mode.limits]
max_tables_per_query = 5
max_join_depth = 5
max_subquery_depth = 3

[shared_policy_store]
# This server creates the shared policy store for all SQL servers
creates_shared_store = true
export_to_ssm = true
ssm_path = "/pmcp/policy-stores/sql-api"

# The shared store includes these AVP templates for all SQL servers.
# Action-based model: separate permits for SELECT, INSERT, UPDATE, DELETE
templates = [
  # Query permits (action = Select)
  "PermitAllSelects",
  "PermitSelectsWithLimits",
  # Write permits (action = Insert/Update)
  "PermitAllInserts",
  "PermitAllUpdates",
  # Delete controls (action = Delete)
  "ForbidAllDeletes",
  "PermitDeleteAllowlist",
  # DDL controls
  "ForbidAllDDL",
  # Cross-action controls
  "ForbidBlockedTables",
  "ForbidSensitiveColumns",
  "ForbidExcessiveComplexity",
]

# =============================================================================
# MCP Tools (~20% - Essential Operations Only)
# =============================================================================
# These 3 tools cover the most common operations for a music database.
# All other operations (analytics, customers, playlists, etc.) are available
# via Code Mode - the LLM can generate SQL using the schema resource.
#
# Pareto Principle:
#   - 3 curated tools = ~20% of functionality (common operations)
#   - Code Mode = ~80% of functionality (long tail via SQL generation)

# -----------------------------------------------------------------------------
# Tool 1: Search Tracks (Most Common Operation)
# -----------------------------------------------------------------------------
# Users most commonly want to find music by name or composer

[[tools]]
name = "search_tracks"
description = "Search tracks by name or composer. Returns track details including album and artist. This is the primary way to find music."
sql = """
SELECT t.TrackId, t.Name, t.Composer, a.Title AS Album, ar.Name AS Artist, g.Name AS Genre
FROM Track t
JOIN Album a ON t.AlbumId = a.AlbumId
JOIN Artist ar ON a.ArtistId = ar.ArtistId
JOIN Genre g ON t.GenreId = g.GenreId
WHERE t.Name LIKE '%' || :query || '%' OR t.Composer LIKE '%' || :query || '%'
ORDER BY t.Name
LIMIT :limit
"""

[[tools.parameters]]
name = "query"
type = "string"
description = "Search term for track name or composer"
required = true

[[tools.parameters]]
name = "limit"
type = "integer"
description = "Maximum number of results"
required = false
default = 20
minimum = 1
maximum = 100

[tools.annotations]
read_only_hint = true
idempotent_hint = true
cost_hint = "medium"

# -----------------------------------------------------------------------------
# Tool 2: Get Album Tracks (Browse Album Contents)
# -----------------------------------------------------------------------------
# After finding music, users want to see what else is on the album

[[tools]]
name = "get_album_tracks"
description = "Get all tracks for an album. Use this to browse an album's contents after finding a track you like."
sql = """
SELECT t.TrackId, t.Name, t.Composer, t.Milliseconds, t.UnitPrice, g.Name AS Genre
FROM Track t
JOIN Genre g ON t.GenreId = g.GenreId
WHERE t.AlbumId = :album_id
ORDER BY t.TrackId
"""

[[tools.parameters]]
name = "album_id"
type = "integer"
description = "Album ID (get this from search_tracks results)"
required = true

[tools.annotations]
read_only_hint = true
idempotent_hint = true
cost_hint = "low"

# -----------------------------------------------------------------------------
# Tool 3: List Artists (Basic Discovery)
# -----------------------------------------------------------------------------
# Allows browsing the catalog when users don't have a specific search term

[[tools]]
name = "list_artists"
description = "List all artists with pagination. Use for browsing the catalog or when you don't know what to search for."
sql = "SELECT ArtistId, Name FROM Artist ORDER BY Name LIMIT :limit OFFSET :offset"

[[tools.parameters]]
name = "limit"
type = "integer"
description = "Maximum number of artists to return"
required = false
default = 20
minimum = 1
maximum = 100

[[tools.parameters]]
name = "offset"
type = "integer"
description = "Number of artists to skip (for pagination)"
required = false
default = 0
minimum = 0

[tools.annotations]
read_only_hint = true
idempotent_hint = true
cost_hint = "low"

