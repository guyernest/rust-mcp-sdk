# -----------------------------------------------------------------------------
# Resource 1: Schema Documentation
# -----------------------------------------------------------------------------

[[resources]]
uri = "docs://chinook/schema"
name = "Chinook Database Schema"
description = "Tables, columns, relationships for the Chinook music database"
mime_type = "text/markdown"
content = """
# Chinook Database Schema (SQLite)

## Quick Reference

| Fact | Value |
|------|-------|
| Dialect | SQLite (standard SQL-92) |
| Tables | 11 tables, read-write (INSERT/UPDATE allowed) |
| Primary keys | Integer auto-increment (`ArtistId`, `TrackId`, etc.) |
| Foreign keys | Enforced — JOINs use standard FK columns |
| Sensitive columns | Address, PostalCode, Phone, Email, Password |
| String matching | SQLite LIKE is case-insensitive for ASCII |
| LIMIT required | Yes, max 1000 |
| Date format | `strftime('%Y-%m', InvoiceDate)` for date grouping |

## Sample IDs for Testing

| ID | Column | Value | Table |
|----|--------|-------|-------|
| ArtistId = 1 | Name | AC/DC | Artist |
| AlbumId = 1 | Title | For Those About To Rock We Salute You | Album |
| TrackId = 1 | Name | For Those About To Rock (We Salute You) | Track |
| GenreId = 1 | Name | Rock | Genre |
| CustomerId = 1 | Name | Luis Goncalves | Customer |
| EmployeeId = 1 | Name | Andrew Adams | Employee |
| InvoiceId = 1 | CustomerId | 2 | Invoice |
| PlaylistId = 1 | Name | Music | Playlist |

## Row Counts

| Table | Rows |
|-------|------|
| Artist | 275 |
| Album | 347 |
| Track | 3,503 |
| Genre | 25 |
| MediaType | 5 |
| Playlist | 18 |
| PlaylistTrack | 8,715 |
| Customer | 59 |
| Employee | 8 |
| Invoice | 412 |
| InvoiceLine | 2,240 |

Digital media store with artists, albums, tracks, customers, and invoices.

## Tables

### Artist
| Column | Type | Description |
|--------|------|-------------|
| ArtistId | INTEGER | Primary key |
| Name | TEXT | Artist name |

### Album
| Column | Type | Description |
|--------|------|-------------|
| AlbumId | INTEGER | Primary key |
| Title | TEXT | Album title |
| ArtistId | INTEGER | FK to Artist |

### Track
| Column | Type | Description |
|--------|------|-------------|
| TrackId | INTEGER | Primary key |
| Name | TEXT | Track name |
| AlbumId | INTEGER | FK to Album |
| MediaTypeId | INTEGER | FK to MediaType |
| GenreId | INTEGER | FK to Genre |
| Composer | TEXT | Composer (nullable) |
| Milliseconds | INTEGER | Duration in ms |
| Bytes | INTEGER | File size |
| UnitPrice | DECIMAL | Price |

### Genre
| Column | Type | Description |
|--------|------|-------------|
| GenreId | INTEGER | Primary key |
| Name | TEXT | Genre name |

### MediaType
| Column | Type | Description |
|--------|------|-------------|
| MediaTypeId | INTEGER | Primary key |
| Name | TEXT | Format (MP3, AAC) |

### Playlist / PlaylistTrack
Junction table: PlaylistId + TrackId

### Customer
| Column | Type | Sensitive |
|--------|------|-----------|
| CustomerId | INTEGER | |
| FirstName, LastName | TEXT | |
| Company, City, State, Country | TEXT | |
| Address, PostalCode | TEXT | Yes |
| Phone, Email | TEXT | Yes |
| SupportRepId | INTEGER | FK to Employee |

### Employee
Similar to Customer with Address, Phone, Email as sensitive.
ReportsTo links to manager.

### Invoice / InvoiceLine
Invoice: CustomerId, InvoiceDate, Total, BillingAddress
InvoiceLine: InvoiceId, TrackId, UnitPrice, Quantity

## Relationships

```
Artist (1) ───< Album (N) ───< Track (N)
Genre (1) ─────────────────────< Track (N)
Playlist (N) >── PlaylistTrack ──< Track (N)
Customer (1) ───< Invoice (N) ───< InvoiceLine (N) >─── Track
Employee (1) ───< Customer (N) [SupportRepId]
```

## JOIN Conditions Reference

| From | To | JOIN ON |
|------|----|---------|
| Artist (ar) | Album (a) | `ar.ArtistId = a.ArtistId` |
| Album (a) | Track (t) | `a.AlbumId = t.AlbumId` |
| Track (t) | Genre (g) | `t.GenreId = g.GenreId` |
| Track (t) | MediaType (mt) | `t.MediaTypeId = mt.MediaTypeId` |
| Track (t) | InvoiceLine (il) | `t.TrackId = il.TrackId` |
| Invoice (i) | InvoiceLine (il) | `i.InvoiceId = il.InvoiceId` |
| Customer (c) | Invoice (i) | `c.CustomerId = i.CustomerId` |
| Employee (e) | Customer (c) | `e.EmployeeId = c.SupportRepId` |
| Playlist (p) | PlaylistTrack (pt) | `p.PlaylistId = pt.PlaylistId` |
| PlaylistTrack (pt) | Track (t) | `pt.TrackId = t.TrackId` |

**Common multi-hop JOINs:**
- Track → Artist: `Track → Album → Artist` (2 JOINs)
- Track sales: `Track → InvoiceLine → Invoice` (2 JOINs)
- Customer purchases: `Customer → Invoice → InvoiceLine → Track` (3 JOINs)

## Genres Available

Rock, Jazz, Metal, Blues, Latin, Pop, Classical, R&B/Soul, Hip Hop/Rap, Electronica/Dance, Alternative, Soundtrack, Comedy, Drama, etc.
"""

