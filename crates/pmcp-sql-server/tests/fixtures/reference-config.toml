[[resources]]
uri = "code-mode://learnings"
name = "Code Mode Learnings"
description = "Tips and corrections from Code Mode usage"
mime_type = "text/markdown"
content = """
# Code Mode Learnings

## Critical Mistakes (Will Return Wrong Results)

### 1. Forgetting LIMIT
**Wrong:**
```sql
SELECT * FROM Track
```
**Correct:**
```sql
SELECT * FROM Track LIMIT 100
```

### 2. Selecting Sensitive Columns Unnecessarily
**Less secure:**
```sql
SELECT * FROM Customer LIMIT 50
```
**Better** — name specific columns, skip Address/Phone/Email:
```sql
SELECT CustomerId, FirstName, LastName, Company, Country FROM Customer LIMIT 50
```

### 3. Forgetting JOIN for Artist Name
Track has no Artist column — you must go through Album:
**Wrong:**
```sql
SELECT t.Name, t.Artist FROM Track t LIMIT 20  -- No 'Artist' column on Track
```
**Correct** — Track → Album → Artist:
```sql
SELECT t.Name, ar.Name AS Artist
FROM Track t
JOIN Album a ON t.AlbumId = a.AlbumId
JOIN Artist ar ON a.ArtistId = ar.ArtistId
LIMIT 20;
```

### 4. PlaylistTrack Requires Compound Key
PlaylistTrack has no single primary key. It uses (PlaylistId, TrackId):
```sql
-- Delete a specific track from a playlist
DELETE FROM PlaylistTrack WHERE PlaylistId = 1 AND TrackId = 100;
```
Forgetting either column affects all tracks in a playlist or all playlists for a track.

### 5. SELECT * from Customer Exposes Sensitive Columns
Customer and Employee contain Address, Phone, Email, PostalCode.
Always name specific columns to avoid triggering sensitive column warnings.

## Validation Errors and Fixes

### "LIMIT required"
Every SELECT must end with `LIMIT n` where n <= 1000.

### "Query type not allowed"
DELETE is blocked. Only SELECT, INSERT, and UPDATE are allowed.

### "Sensitive column access"
Accessing Address, PostalCode, Phone, Email, or Password elevates the risk level.
Use specific column names to avoid accidentally including them.

## Performance Tips

1. **Use indexes**: Primary keys (ArtistId, TrackId, etc.) are indexed
2. **Limit joins**: Each JOIN adds processing time
3. **Filter early**: Put WHERE before GROUP BY when possible
4. **Avoid SELECT ***: Name specific columns to skip sensitive data and reduce result size

## SQLite-Specific Notes

- **Date formatting**: `strftime('%Y-%m', InvoiceDate)` for month grouping
- **String concatenation**: `||` not `+` or `CONCAT()`
- **Case sensitivity**: LIKE is case-insensitive for ASCII in SQLite
- **Boolean values**: SQLite uses 0/1, not true/false
- **No LIMIT in subqueries** with some constructs — use CTEs instead
"""

