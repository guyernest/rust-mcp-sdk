[[resources]]
uri = "docs://chinook/examples"
name = "Chinook Example Queries"
description = "Example SQL queries for common operations"
mime_type = "text/markdown"
content = """
# Chinook Example Queries

## Artist & Album Queries

```sql
-- Get artist by ID
SELECT * FROM Artist WHERE ArtistId = 1 LIMIT 1;

-- Search artists
SELECT ArtistId, Name FROM Artist WHERE Name LIKE '%beatles%' LIMIT 20;

-- Albums by artist
SELECT a.AlbumId, a.Title FROM Album a WHERE a.ArtistId = 1 ORDER BY a.Title;
```

## Genre & Playlist Queries

```sql
-- Genre track counts
SELECT g.Name, COUNT(t.TrackId) as TrackCount
FROM Genre g LEFT JOIN Track t ON g.GenreId = t.GenreId
GROUP BY g.GenreId ORDER BY TrackCount DESC LIMIT 20;

-- Tracks by genre
SELECT t.Name, ar.Name as Artist
FROM Track t
JOIN Album a ON t.AlbumId = a.AlbumId
JOIN Artist ar ON a.ArtistId = ar.ArtistId
WHERE t.GenreId = (SELECT GenreId FROM Genre WHERE Name = 'Jazz')
LIMIT 50;

-- Playlist contents
SELECT t.Name, ar.Name as Artist
FROM PlaylistTrack pt
JOIN Track t ON pt.TrackId = t.TrackId
JOIN Album a ON t.AlbumId = a.AlbumId
JOIN Artist ar ON a.ArtistId = ar.ArtistId
WHERE pt.PlaylistId = 1
LIMIT 50;
```

## Analytics Queries

```sql
-- Top selling tracks
SELECT t.Name, ar.Name as Artist, COUNT(*) as Sales
FROM InvoiceLine il
JOIN Track t ON il.TrackId = t.TrackId
JOIN Album a ON t.AlbumId = a.AlbumId
JOIN Artist ar ON a.ArtistId = ar.ArtistId
GROUP BY t.TrackId ORDER BY Sales DESC LIMIT 10;

-- Revenue by genre
SELECT g.Name, SUM(il.UnitPrice * il.Quantity) as Revenue
FROM InvoiceLine il
JOIN Track t ON il.TrackId = t.TrackId
JOIN Genre g ON t.GenreId = g.GenreId
GROUP BY g.GenreId ORDER BY Revenue DESC LIMIT 10;

-- Monthly sales
SELECT strftime('%Y-%m', InvoiceDate) as Month, SUM(Total) as Revenue
FROM Invoice GROUP BY Month ORDER BY Month LIMIT 50;
```

## Customer Queries (avoid sensitive columns)

```sql
-- List customers (public info only)
SELECT CustomerId, FirstName, LastName, Company, Country, City
FROM Customer ORDER BY LastName LIMIT 50;

-- Customer purchases
SELECT i.InvoiceDate, i.Total, t.Name as Track
FROM Invoice i
JOIN InvoiceLine il ON i.InvoiceId = il.InvoiceId
JOIN Track t ON il.TrackId = t.TrackId
WHERE i.CustomerId = 1
ORDER BY i.InvoiceDate DESC LIMIT 20;

-- Customer with their support rep (Employee)
SELECT c.FirstName || ' ' || c.LastName AS Customer,
       e.FirstName || ' ' || e.LastName AS SupportRep
FROM Customer c
JOIN Employee e ON c.SupportRepId = e.EmployeeId
ORDER BY c.LastName LIMIT 50;

-- Invoices in a date range
SELECT i.InvoiceId, c.FirstName || ' ' || c.LastName AS Customer,
       i.InvoiceDate, i.Total
FROM Invoice i
JOIN Customer c ON i.CustomerId = c.CustomerId
WHERE i.InvoiceDate BETWEEN '2009-01-01' AND '2009-12-31'
ORDER BY i.InvoiceDate LIMIT 50;
```

## Playlist Queries

```sql
-- PlaylistTrack junction table — requires compound key (PlaylistId + TrackId)
SELECT p.Name AS Playlist, t.Name AS Track, ar.Name AS Artist
FROM Playlist p
JOIN PlaylistTrack pt ON p.PlaylistId = pt.PlaylistId
JOIN Track t ON pt.TrackId = t.TrackId
JOIN Album a ON t.AlbumId = a.AlbumId
JOIN Artist ar ON a.ArtistId = ar.ArtistId
WHERE p.PlaylistId = 1
LIMIT 50;

-- Playlists containing a specific track
SELECT p.Name AS Playlist
FROM PlaylistTrack pt
JOIN Playlist p ON pt.PlaylistId = p.PlaylistId
WHERE pt.TrackId = 1
LIMIT 20;
```

## Write Operations (INSERT/UPDATE allowed)

```sql
-- Add a new artist
INSERT INTO Artist (Name) VALUES ('New Artist Name');

-- Add an album for an existing artist
INSERT INTO Album (Title, ArtistId) VALUES ('New Album Title', 1);

-- Update a track price
UPDATE Track SET UnitPrice = 1.29 WHERE TrackId = 1;

-- Add a track to a playlist
INSERT INTO PlaylistTrack (PlaylistId, TrackId) VALUES (1, 100);
```
"""

