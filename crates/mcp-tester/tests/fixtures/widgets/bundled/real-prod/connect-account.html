<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect AWS Account</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
        }

        #waiting {
            text-align: center;
            padding: 48px 16px;
            color: #64748b;
            font-size: 12px;
        }

        #content { display: none; }

        h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 4px;
            color: #f8fafc;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 12px;
            margin: 0 0 16px;
        }

        .steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #10b981;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-num.done {
            background: #10b981;
        }

        .step-title {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .step-desc {
            color: #94a3b8;
            font-size: 12px;
            margin: 0;
        }

        .cfn-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding: 8px 14px;
            background: #10b981;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }

        .cfn-btn:hover { background: #34d399; }

        .info-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px 12px;
            margin-top: 8px;
        }

        .info-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: #10b981;
            word-break: break-all;
            user-select: all;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            padding: 4px 10px;
            background: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .copy-btn:hover { background: #475569; }

        .status-box {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .status-box.success {
            background: #10b98120;
            border: 1px solid #10b98140;
            color: #10b981;
        }

        .status-box.error {
            background: #ef444420;
            border: 1px solid #ef444440;
            color: #f87171;
        }

        .status-box.pending {
            background: #f59e0b20;
            border: 1px solid #f59e0b40;
            color: #fbbf24;
        }

        .status-icon { font-size: 20px; margin-bottom: 4px; }
        .status-text { font-size: 13px; font-weight: 500; }
        .status-detail { font-size: 11px; opacity: 0.8; margin-top: 2px; }

        .permissions {
            margin-top: 8px;
            font-size: 11px;
            color: #64748b;
        }

        .permissions summary {
            cursor: pointer;
            color: #94a3b8;
            font-size: 12px;
        }

        .perm-list {
            margin: 4px 0 0 12px;
            padding: 0;
            list-style: none;
        }

        .perm-list li::before {
            content: '✓ ';
            color: #10b981;
        }
    </style>
