<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Coverage Analysis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 16px;
            min-height: 400px;
            overflow-y: auto;
        }

        #waiting {
            text-align: center;
            padding: 48px 16px;
            color: #7f8c9b;
            font-size: 13px;
        }

        #app { display: none; }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #f0f0f0;
        }

        .back-btn {
            display: none;
            background: #16213e;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 150ms ease, color 150ms ease;
        }

        .back-btn:hover {
            background: #1e293b;
            color: #e2e8f0;
        }

        .gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .gauge-label {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 6px;
        }

        #treemap-container {
            width: 100%;
            min-height: 300px;
            position: relative;
            margin-bottom: 16px;
        }

        .treemap-cell {
            position: absolute;
            overflow: hidden;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4px;
            transition: opacity 150ms ease;
            cursor: default;
        }

        .treemap-cell:hover {
            opacity: 0.85;
        }

        .treemap-cell .cell-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .treemap-cell .cell-cost {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        .score-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            min-width: 32px;
            text-align: center;
        }
        .score-high { background: #166534; color: #4ade80; }
        .score-med { background: #854d0e; color: #fbbf24; }
        .score-low { background: #7f1d1d; color: #fca5a5; }

        .other-tag-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 12px;
            color: #94a3b8;
        }
        .other-tag-row .tag-name { flex: 1; color: #cbd5e1; }
        .other-tag-row .tag-meta { color: #64748b; font-size: 11px; }

        .tag-btn {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 150ms ease;
        }
        .tag-btn:hover { border-color: #64748b; color: #e2e8f0; }
        .tag-btn.active {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
            font-weight: 600;
        }

        .treemap-group-label {
            position: absolute;
            font-size: 10px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 2;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .coverage-badge {
            position: absolute;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            background: rgba(0,0,0,0.4);
            padding: 1px 5px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 2;
        }

        .account-cell {
            cursor: pointer;
        }

        .account-cell:hover {
            opacity: 0.8;
            outline: 2px solid #38bdf8;
        }

        #legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        #demo-banner {
            display: none;
            text-align: center;
            padding: 6px 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            font-size: 11px;
            color: #94a3b8;
        }

        .improvement-section {
            margin-top: 16px;
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
        }

        .improvement-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 8px;
        }

        .improvement-item {
            padding: 6px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 11px;
        }

        .improvement-item:last-child {
            border-bottom: none;
        }

        .improvement-item .priority-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 6px;
        }

        .priority-badge.high { background: #dc2626; color: #fff; }
        .priority-badge.medium { background: #d97706; color: #fff; }
        .priority-badge.low { background: #059669; color: #fff; }

        .api-note {
            text-align: center;
            font-size: 10px;
            color: #64748b;
            margin-top: 8px;
        }

        .limitations-note {
            text-align: center;
            font-size: 11px;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
    </style>
