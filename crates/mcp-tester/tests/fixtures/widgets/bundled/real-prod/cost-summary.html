<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cost Summary</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
        }

        #waiting {
            text-align: center;
            padding: 48px 16px;
            color: #64748b;
            font-size: 12px;
        }

        .state-msg {
            display: none;
            text-align: center;
            padding: 48px 16px;
            color: #64748b;
        }

        .state-msg h3 {
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .state-msg p {
            margin: 0;
            font-size: 12px;
        }

        #content {
            display: none;
        }

        .summary {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .kpi-panel {
            flex: 0 0 45%;
            min-width: 0;
        }

        .chart-panel {
            flex: 1 1 55%;
            min-width: 0;
            position: relative;
            height: 220px;
        }

        @media (max-width: 500px) {
            .summary { flex-direction: column; }
            .kpi-panel { flex: none; width: 100%; }
            .chart-panel { flex: none; width: 100%; height: 200px; }
        }

        .kpi-hero {
            font-size: 28px;
            font-weight: 600;
            color: #10b981;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .kpi-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 12px;
        }

        .kpi-stat {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 2px;
        }

        .kpi-stat-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 12px;
        }

        .kpi-top-service {
            font-size: 12px;
            color: #64748b;
        }

        .kpi-top-service a {
            color: #10b981;
            cursor: pointer;
            text-decoration: none;
        }

        .kpi-top-service a:hover {
            text-decoration: underline;
        }

    </style>
