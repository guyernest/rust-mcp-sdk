<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Summary</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
        }

        #waiting {
            text-align: center;
            padding: 48px 16px;
            color: #64748b;
            font-size: 12px;
        }

        .state-msg {
            display: none;
            text-align: center;
            padding: 48px 16px;
            color: #64748b;
        }

        .state-msg h3 {
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .state-msg p {
            margin: 0;
            font-size: 12px;
        }

        #content {
            display: none;
        }

        .total-banner {
            text-align: center;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(16, 185, 129, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .total-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 700;
            color: #10b981;
            line-height: 1.2;
        }

        .total-sub {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .chart-container {
            position: relative;
            height: 280px;
            margin-bottom: 12px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #94a3b8;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .legend-dot.striped {
            background: repeating-linear-gradient(
                45deg,
                #f59e0b,
                #f59e0b 2px,
                transparent 2px,
                transparent 4px
            );
        }
    </style>
