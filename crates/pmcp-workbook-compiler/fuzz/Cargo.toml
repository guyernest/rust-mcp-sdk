[package]
name = "pmcp-workbook-compiler-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

# Why: this is a cargo-fuzz harness crate, excluded from the workspace (the root
# Cargo.toml `exclude`s every `fuzz/`); it is built only via `cargo fuzz` on a
# nightly toolchain. It pins ONLY the parser surface it drives.
[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.pmcp-workbook-compiler]
path = ".."

[[bin]]
name = "fuzz_formula_parser"
path = "fuzz_targets/fuzz_formula_parser.rs"
test = false
doc = false
bench = false

# Prevent this Cargo.toml from being absorbed into the parent workspace — the
# fuzz crate resolves its own deps.
[workspace]
