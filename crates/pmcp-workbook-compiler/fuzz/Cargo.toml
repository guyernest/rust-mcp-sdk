[package]
name = "pmcp-workbook-compiler-fuzz"
version = "0.0.0"
publish = false
edition = "2021"
license = "MIT OR Apache-2.0"

# Why: this is a cargo-fuzz harness crate, excluded from the parent workspace (the
# root Cargo.toml `exclude`s every `fuzz/`); it is built only via `cargo fuzz` on a
# nightly toolchain. cargo-fuzz builds with `--cfg fuzzing`, which enables the
# compiler crate's `#[cfg(fuzzing)]` hooks over the quarantined raw provenance
# reader and the untrusted formula parser.
[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
pmcp-workbook-compiler = { path = ".." }
# The Dag + upstream_input_leaves under test live in the runtime crate. The fuzz
# crate already depends on the compiler (which depends on runtime), so this path dep
# is consistent — it just makes `pmcp_workbook_runtime::dag::upstream_input_leaves`
# directly reachable from the target (WBV2-03 §4.2 fuzz arm).
pmcp-workbook-runtime = { path = "../../pmcp-workbook-runtime" }

# Prevent this Cargo.toml from being absorbed into the parent workspace — the
# fuzz crate resolves its own deps.
[workspace]

[[bin]]
name = "fuzz_provenance_reader"
path = "fuzz_targets/fuzz_provenance_reader.rs"
doc = false
test = false
bench = false

[[bin]]
name = "fuzz_formula_parser"
path = "fuzz_targets/fuzz_formula_parser.rs"
doc = false
test = false
bench = false

[[bin]]
name = "dialect_version_parse"
path = "fuzz_targets/dialect_version_parse.rs"
doc = false
test = false
bench = false

# Phase 100 (WBV2-02): proves the malformed-table-XML umya panic is contained at
# the ingest catch_unwind seam (T-100-03 DoS) — a clean CompileError, never an abort.
[[bin]]
name = "workbook_table_ingest"
path = "fuzz_targets/workbook_table_ingest.rs"
doc = false
test = false
bench = false

# Phase 100 (WBV2-03): proves `upstream_input_leaves` is TOTAL + subset-correct over
# arbitrary (incl. cyclic) DAGs — never panics/hangs/overflows; result ⊆ input_cells.
[[bin]]
name = "dag_upstream_leaves"
path = "fuzz_targets/dag_upstream_leaves.rs"
doc = false
test = false
bench = false
