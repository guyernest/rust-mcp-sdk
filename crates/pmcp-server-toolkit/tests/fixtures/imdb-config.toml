[[resources]]
uri = "docs://imdb/examples"
name = "IMDB Example Queries"
description = "Example SQL queries for common IMDB operations"
mime_type = "text/markdown"
content = """
# IMDB Example Queries

Copy these patterns — they use correct Athena syntax, JOIN conditions, and ARRAY handling.

## Search and Filter

```sql
-- Movies by genre (genres is ARRAY — use contains())
SELECT tb.primary_title, tb.start_year, tr.average_rating, tr.num_votes
FROM title_basics_optimized tb
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie'
  AND contains(tb.genres, 'Drama')
  AND tr.num_votes >= 10000
ORDER BY tr.average_rating DESC
LIMIT 20;

-- Movies from a decade
SELECT tb.primary_title, tb.start_year, tr.average_rating
FROM title_basics_optimized tb
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie'
  AND tb.start_year BETWEEN 1980 AND 1989
  AND tr.num_votes >= 5000
ORDER BY tr.average_rating DESC
LIMIT 30;

-- Multi-genre filter (AND — must match all)
SELECT tb.primary_title, tb.genres, tr.average_rating
FROM title_basics_optimized tb
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie'
  AND contains(tb.genres, 'Action')
  AND contains(tb.genres, 'Comedy')
ORDER BY tr.average_rating DESC
LIMIT 20;

-- Case-insensitive title search
SELECT tb.primary_title, tb.start_year, tr.average_rating
FROM title_basics_optimized tb
LEFT JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie'
  AND lower(tb.primary_title) LIKE '%godfather%'
ORDER BY tr.num_votes DESC NULLS LAST
LIMIT 20;
```

## People Queries

```sql
-- Movies by actor name (via title_principals)
SELECT tb.primary_title, tb.start_year, tr.average_rating, tp.category
FROM title_basics_optimized tb
JOIN title_principals_optimized tp ON tb.tconst = tp.tconst
JOIN name_basics_optimized nb ON tp.nconst = nb.nconst
LEFT JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie'
  AND lower(nb.primary_name) LIKE '%tom hanks%'
  AND tp.category IN ('actor', 'actress')
ORDER BY tr.average_rating DESC NULLS LAST
LIMIT 20;

-- Directors of a specific movie (directors is ARRAY — use UNNEST)
SELECT tb.primary_title, nb.primary_name AS director
FROM title_basics_optimized tb
JOIN title_crew_optimized tc ON tb.tconst = tc.tconst
CROSS JOIN UNNEST(tc.directors) AS t(director_id)
JOIN name_basics_optimized nb ON director_id = nb.nconst
WHERE tb.tconst = 'tt0111161'
LIMIT 10;

-- All movies by a director (via title_crew UNNEST)
SELECT tb.primary_title, tb.start_year, tr.average_rating
FROM title_crew_optimized tc
CROSS JOIN UNNEST(tc.directors) AS t(dir_id)
JOIN name_basics_optimized nb ON dir_id = nb.nconst
JOIN title_basics_optimized tb ON tc.tconst = tb.tconst
LEFT JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE lower(nb.primary_name) LIKE '%christopher nolan%'
  AND tb.title_type = 'movie'
ORDER BY tb.start_year DESC
LIMIT 20;

-- Cast of a specific movie
SELECT nb.primary_name, tp.category, tp.characters
FROM title_principals_optimized tp
JOIN name_basics_optimized nb ON tp.nconst = nb.nconst
WHERE tp.tconst = 'tt0111161'
ORDER BY tp.category
LIMIT 20;
```

## TV Series

```sql
-- Episode ratings for a series (NO episode titles available)
SELECT ep.season_number, ep.episode_number, tr.average_rating, tr.num_votes
FROM title_episode_optimized ep
LEFT JOIN title_ratings_optimized tr ON ep.tconst = tr.tconst
WHERE ep.parent_tconst = 'tt0903747'  -- Breaking Bad
ORDER BY ep.season_number, ep.episode_number
LIMIT 100;

-- Season averages for a series
SELECT ep.season_number,
       COUNT(*) AS episodes,
       ROUND(AVG(tr.average_rating), 2) AS avg_rating,
       MIN(tr.average_rating) AS min_rating,
       MAX(tr.average_rating) AS max_rating
FROM title_episode_optimized ep
LEFT JOIN title_ratings_optimized tr ON ep.tconst = tr.tconst
WHERE ep.parent_tconst = 'tt0903747'
GROUP BY ep.season_number
ORDER BY ep.season_number
LIMIT 20;

-- Top rated TV series
SELECT tb.primary_title, tb.start_year, tr.average_rating, tr.num_votes
FROM title_basics_optimized tb
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'tvSeries'
  AND tr.num_votes >= 50000
ORDER BY tr.average_rating DESC
LIMIT 20;
```

## Analytics

```sql
-- Movies per year with average rating
SELECT tb.start_year, COUNT(*) AS movie_count,
       ROUND(AVG(tr.average_rating), 2) AS avg_rating
FROM title_basics_optimized tb
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie' AND tr.num_votes >= 10000
GROUP BY tb.start_year
ORDER BY tb.start_year DESC
LIMIT 50;

-- Genre popularity (expand genres array into rows)
SELECT genre, COUNT(*) AS title_count,
       ROUND(AVG(tr.average_rating), 2) AS avg_rating
FROM title_basics_optimized tb
CROSS JOIN UNNEST(tb.genres) AS t(genre)
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie' AND tr.num_votes >= 5000
GROUP BY genre
ORDER BY title_count DESC
LIMIT 20;

-- Runtime distribution with CASE
SELECT
  CASE
    WHEN runtime_minutes < 90 THEN 'Short (<90 min)'
    WHEN runtime_minutes < 120 THEN 'Standard (90-120 min)'
    WHEN runtime_minutes < 150 THEN 'Long (120-150 min)'
    ELSE 'Very Long (150+ min)'
  END AS category,
  COUNT(*) AS count,
  ROUND(AVG(tr.average_rating), 2) AS avg_rating
FROM title_basics_optimized tb
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie' AND tb.runtime_minutes IS NOT NULL
GROUP BY 1
ORDER BY count DESC
LIMIT 10;

-- Localized titles for a movie
SELECT ta.title, ta.region, ta.language, ta.is_original_title
FROM title_akas_optimized ta
WHERE ta.title_id = 'tt0111161'
ORDER BY ta.region
LIMIT 50;
```
"""

