# Tips and corrections discovered from real usage

[[resources]]
uri = "code-mode://learnings"
name = "Code Mode Learnings"
description = "Tips and corrections from Code Mode usage"
mime_type = "text/markdown"
content = """
# Code Mode Learnings

Tips and corrections discovered from real usage of this server.

## Critical Mistakes (Will Return Wrong Results)

### 1. Joining Episodes to title_basics
**Wrong** — returns zero rows:
```sql
SELECT tb.primary_title as episode_name
FROM title_episode_optimized ep
JOIN title_basics_optimized tb ON ep.tconst = tb.tconst
```
**Why:** title_basics_optimized has NO tvEpisode records.
**Correct** — query episode structure directly:
```sql
SELECT ep.season_number, ep.episode_number, ep.tconst, tr.average_rating
FROM title_episode_optimized ep
LEFT JOIN title_ratings_optimized tr ON ep.tconst = tr.tconst
WHERE ep.parent_tconst = 'tt0903747'
ORDER BY ep.season_number, ep.episode_number
LIMIT 100;
```

### 2. Using Wrong title_type Values
**Wrong:** `'tv_show'`, `'episode'`, `'TV Series'`, `'film'`
**Correct:** `'movie'`, `'short'`, `'tvSeries'`, `'tvMiniSeries'`, `'tvMovie'`
Values are case-sensitive and camelCase.

### 3. title_akas Uses title_id, Not tconst
**Wrong:** `JOIN title_akas_optimized ta ON tb.tconst = ta.tconst`
**Correct:** `JOIN title_akas_optimized ta ON tb.tconst = ta.title_id`

### 4. Treating ARRAY Columns as Scalars
**Wrong:**
```sql
WHERE tb.genres = 'Drama'           -- FAILS: genres is ARRAY<STRING>
WHERE tb.genres LIKE '%Drama%'      -- FAILS: can't LIKE an array
WHERE 'Drama' IN (tb.genres)        -- FAILS: wrong syntax
```
**Correct:**
```sql
WHERE contains(tb.genres, 'Drama')  -- Athena array membership test
```

### 5. Treating directors/writers as Scalar Joins
**Wrong:**
```sql
JOIN name_basics_optimized nb ON tc.directors = nb.nconst  -- FAILS: directors is ARRAY
```
**Correct:**
```sql
CROSS JOIN UNNEST(tc.directors) AS t(dir_id)
JOIN name_basics_optimized nb ON dir_id = nb.nconst
```

### 6. Exact Match on Names
**Wrong** — may return zero rows due to case or spacing differences:
```sql
WHERE nb.primary_name = 'Tom Hanks'
```
**Correct** — use case-insensitive partial match:
```sql
WHERE lower(nb.primary_name) LIKE '%tom hanks%'
```
Names may have unexpected formatting. Always use `lower()` + `LIKE`.

## Validation Errors and Fixes

### "LIMIT required"
Every SELECT must end with `LIMIT n` where n ≤ 1000.

### "Too many tables"
Maximum 5 tables per query. Count each table reference (including subqueries).

### "Query type not allowed"
Only SELECT is allowed. INSERT, UPDATE, DELETE, CREATE, ALTER, DROP are blocked.

## Performance Tips

1. **Filter early**: Apply WHERE on title_basics before JOINing to ratings/principals
2. **Use num_votes threshold**: `tr.num_votes >= 10000` removes obscure titles with few ratings
3. **Avoid SELECT ***: Name specific columns — Athena scans column-oriented data
4. **LIMIT aggressively**: Athena charges by data scanned, not rows returned
5. **LEFT JOIN for ratings**: Not all titles have ratings — use LEFT JOIN to avoid losing results
6. **Use NULLS LAST**: `ORDER BY tr.average_rating DESC NULLS LAST` prevents NULLs at top

## Athena SQL Dialect Notes

- **String concat**: `'%' || lower(:param) || '%'` (not `CONCAT()`)
- **Array contains**: `contains(array_col, 'value')`
- **Array expand**: `CROSS JOIN UNNEST(array_col) AS t(element)`
- **Array length**: `cardinality(array_col)`
- **Case-sensitive**: Always use `lower()` for string comparisons
- **LIKE patterns**: `%` for wildcard, `_` for single char — no regex in LIKE
- **Regex**: Use `regexp_like(col, 'pattern')` for regex matching
- **Date functions**: `start_year` is INT, not DATE — use arithmetic, not date functions
- **Aggregation**: GROUP BY can reference column positions: `GROUP BY 1, 2`
- **DISTINCT**: Supported for deduplication: `SELECT DISTINCT genre FROM ...`
- **HAVING**: Use after GROUP BY: `GROUP BY genre HAVING COUNT(*) > 100`
"""

