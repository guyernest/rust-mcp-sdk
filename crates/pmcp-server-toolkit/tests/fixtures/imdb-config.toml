# MCP Resources - Code Mode Context
# =============================================================================
# These resources provide all the context needed for Code Mode SQL generation.
# Load them via the start_code_mode prompt.

# -----------------------------------------------------------------------------
# Resource 1: Schema Documentation
# -----------------------------------------------------------------------------
# Tables, columns, relationships, and data limitations

[[resources]]
uri = "docs://imdb/schema"
name = "IMDB Database Schema"
description = "Tables, columns, relationships, and data limitations for the IMDB database"
mime_type = "text/markdown"
content = """
# IMDB Database Schema (AWS Athena / Presto SQL)

## Quick Reference

| Fact | Value |
|------|-------|
| Dialect | AWS Athena (Presto/Trino SQL) |
| Tables | 7 tables, all read-only |
| Primary keys | `tconst` (titles), `nconst` (people) |
| Array columns | genres, directors, writers, primary_profession, known_for_titles |
| Array syntax | `contains(arr, 'val')` not `arr = 'val'` |
| String matching | Case-sensitive — always use `lower()` |
| LIMIT required | Yes, max 1000 |
| Episode titles | NOT available in title_basics |

## Sample IDs for Testing

| ID | Name | Type |
|----|------|------|
| tt0111161 | The Shawshank Redemption | movie |
| tt0068646 | The Godfather | movie |
| tt0468569 | The Dark Knight | movie |
| tt0903747 | Breaking Bad | tvSeries |
| tt0944947 | Game of Thrones | tvSeries |
| nm0000138 | Leonardo DiCaprio | person |
| nm0000151 | Morgan Freeman | person |
| nm0634240 | Christopher Nolan | person |

## SQL Dialect: Athena (Presto/Trino)

Key syntax differences from standard SQL:
- **ARRAY membership**: `contains(array_col, 'value')` — NOT `array_col = 'value'`
- **ARRAY expansion**: `CROSS JOIN UNNEST(array_col) AS t(element)` — expands array into rows
- **String matching**: `lower(col) LIKE '%term%'` — Athena is case-sensitive by default
- **NULL ordering**: `ORDER BY col DESC NULLS LAST` — for predictable sort order
- **String concatenation**: `'%' || lower(:param) || '%'` — use `||` not `CONCAT()`

## Tables

### title_basics_optimized
Core table — basic information about titles (movies, TV shows, shorts).
**Approx rows:** ~2.1M
**IMPORTANT**: Does NOT contain tvEpisode records.

| Column | Type | Description | Values |
|--------|------|-------------|--------|
| tconst | STRING | Primary key (e.g., 'tt0111161') | Prefix: 'tt' |
| title_type | STRING | Content type | 'movie', 'short', 'tvSeries', 'tvMiniSeries', 'tvMovie' |
| primary_title | STRING | Popular title | e.g., 'The Shawshank Redemption' |
| original_title | STRING | Original language title | |
| is_adult | INT | Adult content flag | 0 = no, 1 = yes |
| start_year | INT | Release year | e.g., 1994 |
| runtime_minutes | INT | Runtime in minutes | e.g., 142 (nullable) |
| genres | ARRAY<STRING> | Genre list | 'Drama', 'Comedy', 'Action', 'Thriller', 'Horror', 'Sci-Fi', 'Romance', 'Crime', 'Adventure', 'Animation' |

### title_ratings_optimized
Ratings and vote counts. Not all titles have ratings.
**Approx rows:** ~1.4M

| Column | Type | Description |
|--------|------|-------------|
| tconst | STRING | FK → title_basics_optimized.tconst |
| average_rating | DOUBLE | Weighted average rating (1.0–10.0) |
| num_votes | INT | Number of votes (ranges: 5 to 2.8M) |

### title_akas_optimized
Alternative titles in different regions/languages.
**Approx rows:** ~37M

| Column | Type | Description | Values |
|--------|------|-------------|--------|
| title_id | STRING | FK → title_basics_optimized.tconst | Note: column is `title_id`, not `tconst` |
| title | STRING | Localized title | |
| region | STRING | Region code | 'US', 'GB', 'FR', 'DE', 'JP', etc. |
| language | STRING | Language code | 'en', 'fr', 'de', 'ja', etc. |
| is_original_title | INT | Original title flag | 0 or 1 |

### title_crew_optimized
Directors and writers for titles. One row per title.
**Approx rows:** ~2.1M

| Column | Type | Description |
|--------|------|-------------|
| tconst | STRING | FK → title_basics_optimized.tconst |
| directors | ARRAY<STRING> | Array of nconst IDs — use UNNEST to expand |
| writers | ARRAY<STRING> | Array of nconst IDs — use UNNEST to expand |

### title_episode_optimized
TV episode structure. Links episodes to parent series.
**Approx rows:** ~7.8M
**WARNING**: Episode tconst values do NOT exist in title_basics_optimized.

| Column | Type | Description |
|--------|------|-------------|
| tconst | STRING | Episode identifier |
| parent_tconst | STRING | FK → title_basics_optimized.tconst (the series) |
| season_number | INT | Season number (nullable) |
| episode_number | INT | Episode number (nullable) |

### title_principals_optimized
Principal cast and crew for titles. Multiple rows per title.
**Approx rows:** ~60M

| Column | Type | Description | Values |
|--------|------|-------------|--------|
| tconst | STRING | FK → title_basics_optimized.tconst | |
| nconst | STRING | FK → name_basics_optimized.nconst | |
| category | STRING | Role type | 'actor', 'actress', 'director', 'writer', 'producer', 'composer', 'cinematographer', 'editor', 'self' |
| characters | STRING | Character names (JSON string) | e.g., '["Andy Dufresne"]' |

### name_basics_optimized
People — actors, directors, writers, etc.
**Approx rows:** ~13M

| Column | Type | Description | Values |
|--------|------|-------------|--------|
| nconst | STRING | Primary key (e.g., 'nm0000001') | Prefix: 'nm' |
| primary_name | STRING | Person's name | e.g., 'Tom Hanks' |
| birth_year | INT | Year of birth | |
| death_year | INT | Year of death (nullable) | |
| primary_profession | ARRAY<STRING> | Top professions | 'actor', 'actress', 'director', 'writer', 'producer', 'composer' |
| known_for_titles | ARRAY<STRING> | Notable tconst IDs | |

## JOIN Conditions Reference

Use these exact JOIN conditions:

| From Table | To Table | JOIN ON |
|------------|----------|---------|
| title_basics_optimized (tb) | title_ratings_optimized (tr) | `tb.tconst = tr.tconst` |
| title_basics_optimized (tb) | title_akas_optimized (ta) | `tb.tconst = ta.title_id` |
| title_basics_optimized (tb) | title_crew_optimized (tc) | `tb.tconst = tc.tconst` |
| title_basics_optimized (tb) | title_principals_optimized (tp) | `tb.tconst = tp.tconst` |
| title_basics_optimized (tb) | title_episode_optimized (ep) | `tb.tconst = ep.parent_tconst` (series→episodes) |
| title_principals_optimized (tp) | name_basics_optimized (nb) | `tp.nconst = nb.nconst` |
| title_crew_optimized (tc) | name_basics_optimized (nb) | `CROSS JOIN UNNEST(tc.directors) AS t(dir_id)` then `dir_id = nb.nconst` |

**DO NOT** JOIN `title_episode_optimized.tconst` → `title_basics_optimized.tconst` (episodes are not in title_basics).

## Available Title Types (title_basics_optimized.title_type)

| title_type | Approx Count | Description |
|------------|--------------|-------------|
| movie | ~627K | Feature films |
| short | ~1.05M | Short films |
| tvSeries | ~269K | TV series |
| tvMiniSeries | ~63K | Limited/mini series |
| tvMovie | ~149K | TV movies |

**NOT in this dataset**: tvEpisode, video, videoGame — these were excluded during optimization.

## ARRAY Column Patterns

Several columns are `ARRAY<STRING>`. Use these Athena patterns:

```sql
-- Filter: titles containing 'Drama' genre
WHERE contains(tb.genres, 'Drama')

-- Filter: multiple genres (AND)
WHERE contains(tb.genres, 'Action') AND contains(tb.genres, 'Comedy')

-- Expand: list all genres for a title as separate rows
SELECT tb.primary_title, genre
FROM title_basics_optimized tb
CROSS JOIN UNNEST(tb.genres) AS t(genre)
WHERE tb.tconst = 'tt0111161'
LIMIT 10;

-- Expand directors array to get director names
SELECT nb.primary_name
FROM title_crew_optimized tc
CROSS JOIN UNNEST(tc.directors) AS t(dir_id)
JOIN name_basics_optimized nb ON dir_id = nb.nconst
WHERE tc.tconst = 'tt0111161'
LIMIT 10;
```

## Characters Column (JSON String, NOT Array)

`characters` in title_principals_optimized is a JSON string like `'["Andy Dufresne"]'`.
Do NOT use `contains()` or `UNNEST()` — use string matching or `json_extract_scalar()`.

```sql
-- Extract first character name from JSON string
SELECT nb.primary_name,
       json_extract_scalar(tp.characters, '$[0]') AS character_name
FROM title_principals_optimized tp
JOIN name_basics_optimized nb ON tp.nconst = nb.nconst
WHERE tp.tconst = 'tt0111161'
  AND tp.category IN ('actor', 'actress')
LIMIT 20;

-- Search for a character by name (string matching on JSON)
SELECT tb.primary_title, nb.primary_name, tp.characters
FROM title_principals_optimized tp
JOIN name_basics_optimized nb ON tp.nconst = nb.nconst
JOIN title_basics_optimized tb ON tp.tconst = tb.tconst
WHERE lower(tp.characters) LIKE '%andy dufresne%'
LIMIT 20;
```

## Data Caveats

1. **Episode titles unavailable**: title_basics_optimized has NO tvEpisode records. Use title_episode_optimized for season/episode structure only.
2. **Ratings coverage**: Not all titles have ratings. Use LEFT JOIN to title_ratings_optimized to avoid losing unrated titles.
3. **NULL values**: runtime_minutes, birth_year, death_year, season_number, episode_number can be NULL.
4. **characters column**: JSON string format like `["Character Name"]`, not a plain string.
"""

