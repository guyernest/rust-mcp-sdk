# IMDB Movie Database MCP Server Configuration
# This server connects to IMDB data in AWS Athena, providing movie search
# and exploration capabilities through curated MCP tools and Code Mode.

[server]
id = "imdb"
name = "IMDB Movie Database"
description = "Query the IMDB movie database via AWS Athena. Search movies, browse ratings, and explore film data."
type = "sql-api"
version = "1.0.0"

# =============================================================================
# Display Metadata (defaults for admin-configurable fields)
# =============================================================================
# These values populate the server record on first deploy or after deletion.
# Admin edits via UI always take priority over these defaults.

[metadata]
display_name = "IMDB Movie Database"
short_description = "Query the IMDB movie database via AWS Athena"
description = "Query the IMDB movie database via AWS Athena. Search movies, browse ratings, explore cast and crew, and analyze film data across millions of titles."
tags = ["movies", "imdb", "database", "athena"]
author = "pmcp.run"
visibility = "public"

[database]
# AWS Athena for querying IMDB data
type = "athena"
database = "imdb"
output_location = "s3://aws-athena-query-results-${AWS_ACCOUNT_ID}-${AWS_REGION}/imdb/"
workgroup = "primary"
query_timeout_ms = 60000

# Table definitions for Code Mode schema enrichment
[[database.tables]]
name = "title_basics_optimized"
description = "Basic title information - movies, TV shows, shorts. Contains title, year, runtime, and genres."

[[database.tables]]
name = "title_ratings_optimized"
description = "IMDB ratings and vote counts for titles."

[[database.tables]]
name = "title_akas_optimized"
description = "Alternative titles/names for titles in different regions and languages."

[[database.tables]]
name = "title_crew_optimized"
description = "Directors and writers for titles. References name_basics_optimized via nconst."

[[database.tables]]
name = "title_episode_optimized"
description = "TV episode information - links episodes to their parent series with season/episode numbers."

[[database.tables]]
name = "title_principals_optimized"
description = "Principal cast and crew for titles. Links to name_basics_optimized via nconst."

[[database.tables]]
name = "name_basics_optimized"
description = "People in the database - actors, directors, writers, etc. Contains name, birth/death years, professions."

[database.pool]
max_connections = 5
connection_timeout_seconds = 60

[code_mode]
# Enable Code Mode for custom SQL queries (~80% of functionality)
enabled = true

# Server ID — MUST match the entityId used in Cedar policies (AVP).
# Required for AVP authorization to resolve the correct policy set.
server_id = "imdb"

# IMDB is read-only - no mutations allowed
allow_writes = false
allow_deletes = false
allow_ddl = false

# Require LIMIT on SELECT queries for cost control
require_limit = true
max_limit = 1000

# No blocked or sensitive tables/columns for IMDB
blocked_tables = []
sensitive_columns = []

# Risk levels for auto-approval
auto_approve_levels = ["low"]

# Token settings
token_ttl_seconds = 300

# Secret for HMAC signing (resolved from Secrets Manager)
token_secret = "${CODE_MODE_SECRET}"

# Complexity limits
# Note: With alias tracking, a 2-table JOIN with aliases (tb, tr) correctly counts as 2 tables
[code_mode.limits]
max_tables_per_query = 5
max_join_depth = 4
max_subquery_depth = 2

# =============================================================================
# MCP Tools (~20% - Essential Operations Only)
# =============================================================================
# These 3 tools cover the most common movie database operations.
# All other operations (filtering by genre, year ranges, actor lookups, etc.)
# are available via Code Mode - the LLM can generate SQL using the schema resource.
#
# Pareto Principle:
#   - 3 curated tools = ~20% of functionality (common operations)
#   - Code Mode = ~80% of functionality (long tail via SQL generation)

# -----------------------------------------------------------------------------
# Tool 1: Search Movies (Most Common Operation)
# -----------------------------------------------------------------------------
# Users most commonly want to find movies by title

[[tools]]
name = "search_movies"
description = "Search for movies by title. Returns basic info, ratings, and year."
sql = """
SELECT
    tb.tconst,
    tb.primary_title,
    tb.original_title,
    tb.start_year,
    tb.runtime_minutes,
    tb.genres,
    tr.average_rating,
    tr.num_votes
FROM title_basics_optimized tb
LEFT JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie'
  AND lower(tb.primary_title) LIKE '%' || lower(:query) || '%'
ORDER BY tr.num_votes DESC NULLS LAST
LIMIT :limit
"""

[[tools.parameters]]
name = "query"
type = "string"
description = "Search term for movie title"
required = true
max_length = 20

[[tools.parameters]]
name = "limit"
type = "integer"
description = "Maximum results to return"
required = false
default = 20
minimum = 1
maximum = 100

[tools.annotations]
read_only_hint = true
destructive_hint = false
idempotent_hint = true
open_world_hint = true
cost_hint = "medium"

# -----------------------------------------------------------------------------
# Tool 2: Get Title Details (Lookup by ID)
# -----------------------------------------------------------------------------
# After finding movies, users want detailed information about a specific title

[[tools]]
name = "get_title_details"
description = "Get detailed information about a specific title by IMDB ID."
sql = """
SELECT
    tb.tconst,
    tb.title_type,
    tb.primary_title,
    tb.original_title,
    tb.start_year,
    tb.runtime_minutes,
    tb.genres,
    tb.is_adult,
    tr.average_rating,
    tr.num_votes
FROM title_basics_optimized tb
LEFT JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.tconst = :title_id
LIMIT 1
"""

[[tools.parameters]]
name = "title_id"
type = "string"
description = "IMDB title ID (e.g., 'tt0111161' for The Shawshank Redemption)"
required = true

[tools.annotations]
read_only_hint = true
destructive_hint = false
idempotent_hint = true
open_world_hint = true
cost_hint = "low"

# -----------------------------------------------------------------------------
# Tool 3: Top Rated Movies (Discovery)
# -----------------------------------------------------------------------------
# Allows discovering the best-rated movies with configurable vote threshold

[[tools]]
name = "top_rated_movies"
description = "Get the top-rated movies with a minimum vote count threshold."
sql = """
SELECT
    tb.tconst,
    tb.primary_title,
    tb.start_year,
    tb.genres,
    tb.runtime_minutes,
    tr.average_rating,
    tr.num_votes
FROM title_basics_optimized tb
JOIN title_ratings_optimized tr ON tb.tconst = tr.tconst
WHERE tb.title_type = 'movie'
  AND tr.num_votes >= :min_votes
ORDER BY tr.average_rating DESC, tr.num_votes DESC
LIMIT :limit
"""

[[tools.parameters]]
name = "min_votes"
type = "integer"
description = "Minimum number of votes required"
required = false
default = 25000
minimum = 1000

[[tools.parameters]]
name = "limit"
type = "integer"
description = "Maximum results to return"
required = false
default = 20
minimum = 1
maximum = 100

[tools.annotations]
read_only_hint = true
destructive_hint = false
idempotent_hint = true
open_world_hint = true
cost_hint = "medium"

