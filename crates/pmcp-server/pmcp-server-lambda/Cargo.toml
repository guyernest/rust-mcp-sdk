[package]
name = "pmcp-server-lambda"
version = "0.1.0"
edition = "2021"
authors = ["PMCP SDK Contributors"]
description = "PMCP Server - AWS Lambda wrapper"
license = "MIT"
publish = false

[[bin]]
name = "bootstrap"
# AWS Lambda Custom Runtime API requires this exact name.
path = "src/main.rs"

[dependencies]
pmcp-server = { path = ".." }
pmcp = { path = "../../..", features = ["streamable-http"] }
lambda_http = "0.13"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"] }
tokio = { version = "1", features = ["full"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
