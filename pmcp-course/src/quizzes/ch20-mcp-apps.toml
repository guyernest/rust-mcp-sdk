# Quiz: MCP Apps - UI Resources

id = "ch20-mcp-apps"
title = "MCP Apps: UI Resources and Interactive Interfaces"
lesson_id = "ch20"
pass_threshold = 0.7

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the current status of MCP Apps and UI Resources?"
prompt.distractors = [
    "Stable and supported by all MCP clients in the ecosystem",
    "Deprecated and will be removed in future versions of the specification",
    "Only available in enterprise MCP deployments with premium licensing"
]
answer.answer = "Experimental - subject to change, with limited client support"
answer.position = 0
context = """
MCP Apps (SEP-1865) are experimental. The APIs may change as the specification matures,
most MCP clients don't yet support UI resources, and there may be ecosystem fragmentation
until the spec stabilizes. Design servers to gracefully degrade when UI isn't supported.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800001"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What URI scheme must UI resources use?"
prompt.distractors = [
    "http:// or https:// for web resources hosted on external servers",
    "file:// for local HTML files stored on the client machine",
    "mcp:// for MCP-specific resources following the protocol standard"
]
answer.answer = "ui:// followed by a path identifier (e.g., ui://app/board)"
answer.position = 1
context = """
UI resources use the 'ui://' scheme, similar to how 'http://' identifies web resources
and 'file://' identifies local files. With WidgetDir the URI format is ui://app/{name}
where {name} is the HTML filename without the extension. The scheme identifies MCP UI
resources that hosts should render in sandboxed iframes.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800002"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What MIME type do HTML-based MCP UI resources use?"
answer.answer = "text/html+mcp"
answer.alternatives = ["html+mcp", "text/html+mcp"]
context = """
MCP UI resources use the MIME type 'text/html+mcp' to identify HTML content that follows
MCP communication conventions (postMessage JSON-RPC). This distinguishes MCP-aware HTML
from regular HTML. Future MIME types may include 'application/wasm+mcp' for WebAssembly.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800003"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is WidgetDir and how does it serve widgets?"
prompt.distractors = [
    "A Rust macro that compiles HTML templates into static binary resources",
    "A REST API endpoint that proxies widget requests to external CDNs",
    "A build tool that converts React components into MCP-compatible bundles"
]
answer.answer = "A file-based convention that serves HTML files directly from a directory on disk, with no Rust code needed to define UI content"
answer.position = 2
context = """
WidgetDir is the file-based convention for authoring widgets. You place .html files in
a widgets/ directory and WidgetDir automatically maps them to ui://app/{name} URIs.
For example, widgets/board.html becomes ui://app/board. No configuration files, no
registration code. One HTML file equals one widget. The server reads files fresh on
every request, enabling the hot-reload development workflow.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800020"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why are MCP UIs rendered in sandboxed iframes?"
prompt.distractors = [
    "For better CSS styling isolation between UI components and host application",
    "To improve rendering performance by using isolated browser contexts",
    "To enable offline caching of UI content for improved user experience"
]
answer.answer = "For security - preventing untrusted HTML from accessing host data or DOM"
answer.position = 3
context = """
Sandboxed iframes prevent untrusted HTML from servers from accessing the parent window's
DOM, cookies, localStorage, or making same-origin requests. UIs can only communicate
via postMessage, creating a clear security boundary. This protects users even if a
malicious server sends harmful HTML.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800005"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How does a UI request data from its associated tool?"
prompt.distractors = [
    "Using fetch() to call the MCP server directly over HTTP connection",
    "Reading from a global window.mcpData variable injected by the host",
    "Accessing document.referrer for the tool URL to make direct requests"
]
answer.answer = "Using window.parent.postMessage() with JSON-RPC format"
answer.position = 0
context = """
UIs communicate with the MCP host via postMessage. To request tool data:
window.parent.postMessage({ jsonrpc: '2.0', method: 'tools/call', params: {...}, id: 1 }, '*').
The host validates and executes the tool, then sends results back via postMessage with
type 'mcp-tool-result'.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800006"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What should MCP servers do to handle clients that don't support UI resources?"
prompt.distractors = [
    "Return an error when UI is not supported by the connected client",
    "Require clients to update before connecting to servers with UI resources",
    "Disable all tools when UI capability is missing from client capabilities"
]
answer.answer = "Design tools to return complete JSON data that works without UI (graceful degradation)"
answer.position = 2
context = """
Since many MCP clients don't support UI yet, tools should always return complete, useful
JSON data. The UI is an enhancement, not a requirement. Clients without UI support still
receive the data and can describe it textually. Example: a venue tool returns full
coordinate/name data whether or not the map UI renders.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800008"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What does `cargo pmcp app new <name>` generate?"
prompt.distractors = [
    "A Rust binary crate with a pre-built UI framework and React dependencies",
    "A Docker container image ready for deployment to cloud platforms",
    "An npm package with TypeScript bindings for the MCP protocol"
]
answer.answer = "A scaffolded widget project with HTML template, manifest, and development configuration ready for preview"
answer.position = 1
context = """
'cargo pmcp app new' scaffolds a new MCP Apps project. It generates an HTML template
(widgets/hello.html) with mcpBridge usage, a project manifest, and development
configuration. The scaffolded project is immediately ready for 'cargo pmcp app preview'
so developers can start iterating on their widget right away.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800021"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What does `cargo pmcp app build` produce?"
prompt.distractors = [
    "A standalone executable binary that embeds a web server and all assets",
    "A WebAssembly module that runs in the browser without a server",
    "A JSON manifest file listing all widgets and their dependencies"
]
answer.answer = "Compiled and bundled widget HTML/assets in the format expected by the MCP server for production serving"
answer.position = 3
context = """
'cargo pmcp app build' compiles and bundles the widget HTML and assets into the format
expected by the MCP server for production deployment. This is the build step that
prepares widgets for distribution, as opposed to the development workflow where
widgets are served directly from disk with hot-reload.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800022"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What does the `cargo pmcp app preview` workflow provide?"
prompt.distractors = [
    "A static screenshot of the widget rendered on a white background",
    "An automated test runner that validates widget behavior against test cases",
    "A deployment preview URL hosted on a remote staging server"
]
answer.answer = "A hot-reload development server that re-serves the widget on file changes so developers can iterate without restarting the MCP server"
answer.position = 0
context = """
'cargo pmcp app preview' launches a local development server that watches for file
changes and automatically re-serves the widget HTML. Developers can edit their HTML,
save, and refresh the browser to see changes instantly. This hot-reload workflow
eliminates the need to restart the MCP server during widget development.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800023"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is window.mcpBridge and when is it available?"
prompt.distractors = [
    "A Node.js module that must be imported with require() in server-side code",
    "A browser extension API available on all websites after installing the MCP plugin",
    "A WebSocket connection object created by calling navigator.mcpBridge.connect()"
]
answer.answer = "A convenience API injected by MCP-aware hosts that wraps postMessage calls; available in Claude Desktop and MCP Apps hosts but NOT in raw iframe embedding"
answer.position = 2
context = """
window.mcpBridge is a JavaScript object injected by the adapter layer into widget HTML.
It provides four core methods: callTool(), readResource(), getPrompt(), and notify().
These wrap the underlying postMessage JSON-RPC communication. The bridge is available
in hosts that run an adapter (Claude Desktop, ChatGPT via window.openai, MCP Apps hosts)
but is NOT available in raw iframe embedding without an adapter.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800024"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the purpose of the request ID in postMessage communication?"
prompt.distractors = [
    "To authenticate the requesting user and validate their session token",
    "To prioritize message processing order for time-sensitive operations",
    "To cache responses for performance optimization across repeated calls"
]
answer.answer = "To match responses to their original requests when making multiple calls"
answer.position = 1
context = """
Since postMessage is asynchronous and UIs may make multiple tool calls, the request ID
(the 'id' field in JSON-RPC) correlates responses with requests. When the host returns
a result, it includes requestId so the UI knows which call it's responding to. Essential
for handling: initial load (id: 1), user-triggered refresh (id: 2), detail fetch (id: 3).
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800013"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What problem does the multi-platform adapter pattern solve?"
prompt.distractors = [
    "It compresses widget HTML to reduce network transfer size across platforms",
    "It translates MCP tool schemas into platform-specific API documentation",
    "It encrypts bridge communication to prevent man-in-the-middle attacks"
]
answer.answer = "Different hosts have different APIs (ChatGPT via window.openai, Claude via window.mcpBridge, generic MCP via postMessage) and the adapter provides a single interface that delegates to the correct host API at runtime"
answer.position = 3
context = """
The adapter pattern solves the ecosystem fragmentation problem. ChatGPT uses window.openai,
Claude Desktop uses window.mcpBridge, and generic MCP hosts use raw postMessage. Without
adapters, widget authors would need to write host-specific code. The adapter detects the
host environment at runtime and delegates to the correct underlying API, giving widget
code a single consistent interface (window.mcpBridge) regardless of host.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800025"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What are the four steps of the common MCP Apps architecture pattern?"
prompt.distractors = [
    "1) compile Rust, 2) generate HTML, 3) deploy to CDN, 4) register with host",
    "1) authenticate user, 2) validate schema, 3) execute tool, 4) log result",
    "1) open WebSocket, 2) negotiate protocol, 3) exchange capabilities, 4) stream data"
]
answer.answer = "1) detect host environment, 2) create platform adapter, 3) call tools through adapter, 4) render results in HTML"
answer.position = 0
context = """
All three example walkthroughs (chess, map, dataviz) follow the same 4-step pattern:
First, detect which host environment the widget is running in (ChatGPT, Claude Desktop,
generic MCP). Second, create the appropriate platform adapter. Third, call MCP tools
through the adapter's unified API (window.mcpBridge.callTool). Fourth, render the
tool results in the widget's HTML. This pattern ensures widgets work across all hosts.
"""
id = "f20a1b2c-d3e4-5678-abcd-123456800026"
