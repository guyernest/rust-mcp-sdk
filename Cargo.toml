[package]
name = "pmcp"
version = "2.3.0"
edition = "2021"
authors = ["PAIML Team"]
description = "High-quality Rust SDK for Model Context Protocol (MCP) with full TypeScript SDK compatibility"
license = "MIT"
repository = "https://github.com/paiml/pmcp"
homepage = "https://github.com/paiml/pmcp"
documentation = "https://docs.rs/pmcp"
readme = "README.md"
keywords = ["mcp", "model-context", "sdk", "ai", "llm"]
categories = ["api-bindings", "asynchronous", "network-programming"]
rust-version = "1.83.0"
exclude = [
    "docs/",
    "packages/",
    "tests/playwright/",
    "benches/*.bak",
    "fuzz/",
    "examples/mcp-apps-chess/",
    "examples/mcp-apps-map/",
    "examples/wasm-client/",
    "examples/wasm-mcp-server/",
    "examples/cloudflare-worker-mcp/",
    "examples/26-server-tester/",
    "examples/27-course-server-minimal/",
    "examples/25-oauth-basic/",
    "examples/test-basic/",
    "examples/wasm/",
    "pmcp-book/",
    "pmcp-course/",
    "examples/60_tasks_basic.rs",
    "examples/62_task_workflow_lifecycle.rs",
    "examples/65_durable_mcp_agent.rs",
    # PMAT / PV tooling metadata — not part of the published crate.
    # .pmat/context.db alone is ~21MB and blew past the 10MB crates.io limit
    # during the v2.2.0 release. Keep these out of every future release.
    ".pmat/",
    ".pv/",
    "contracts/",
    # GSD phase planning (6.3MB) and presentation decks (5.6MB) — workspace
    # scaffolding, not crate content. Also blew the 10MB limit during v2.2.0.
    ".planning/",
    "presentations/",
]

[dependencies]
# Core dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["raw_value", "preserve_order"] }
schemars = { version = "1.0", optional = true }
pmcp-macros = { version = "0.5.0", path = "pmcp-macros", optional = true }
async-trait = "0.1"
thiserror = "2.0"
anyhow = "1.0"
tracing = "0.1"
http = "1.1"

# Utility dependencies (needed on all platforms)
glob = "0.3"
url = "2.5"
toml = "1.0"
uuid = { version = "1.17", features = ["v4", "serde", "js"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
regex = "1.11"
urlencoding = "2.1"
indexmap = { version = "2.10", features = ["serde"] }
smallvec = { version = "1.13", features = ["serde", "union"] }
parking_lot = "0.12"
dashmap = "6.1"
bytes = { version = "1.10", optional = true }
futures = "0.3"
pmcp-widget-utils = { path = "crates/pmcp-widget-utils", version = "0.1.0" }
futures-util = { version = "0.3", optional = true }
futures-channel = { version = "0.3", optional = true }
futures-locks = { version = "0.7", optional = true, default-features = false }
http-body-util = "0.1"

# OAuth dependencies
sha2 = "0.11"
base64 = "0.22"
jsonwebtoken = { version = "10.3", optional = true }

# OAuth CLI helper dependencies (feature-gated)
webbrowser = { version = "1", optional = true }
dirs = { version = "6", optional = true }
rand = { version = "0.10", optional = true }
tracing-subscriber = { version = "0.3.20", features = ["env-filter"], optional = true }

# Transport dependencies (optional, feature-gated)
tokio-tungstenite = { version = "0.29", optional = true }
hyper = { version = "1.6", features = ["http1", "server"], optional = true }
hyper-util = { version = "0.1", features = ["tokio", "http1", "server-auto", "client-legacy"], optional = true }
hyper-rustls = { version = "0.27", default-features = false, features = ["http1", "http2", "tls12", "ring", "native-tokio"], optional = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"], optional = true }
axum = { version = "0.8.5", optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = ["cors", "set-header"], optional = true }

# File watching dependencies (optional, feature-gated)
notify = { version = "8.2", optional = true }
glob-match = { version = "0.2", optional = true }

# Validation (optional, feature-gated)
jsonschema = { version = "0.45", optional = true, default-features = false }
garde = { version = "0.22", optional = true }

# SIMD support (optional)
rayon = { version = "1.10", optional = true }

# Platform-specific dependencies
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.46", features = ["rt-multi-thread", "macros", "net", "io-util", "io-std", "fs", "sync", "time", "process", "signal"] }
tokio-stream = { version = "0.1.15" }
tokio-util = { version = "0.7", features = ["rt"] }
reqwest = { version = "0.13", optional = true, default-features = false, features = ["json", "rustls", "form"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console", "Window", "Document", "WebSocket", "MessageEvent", "CloseEvent", "ErrorEvent", "BinaryType", "Headers", "Request", "RequestInit", "Response"] }
js-sys = "0.3"
futures-channel = "0.3"
futures-locks = { version = "0.7", default-features = false }
getrandom = { version = "0.4", features = ["wasm_js"] }

[dev-dependencies]
# Testing
tempfile = "3.19"
proptest = "1.7"
quickcheck = "1.0"
quickcheck_macros = "1.1"
rstest = "0.26"
mockall = "0.14"
pretty_assertions = "1.4"
test-case = "3.3"
criterion = { version = "0.8", features = ["html_reports"] }
insta = { version = "1.43", features = ["json", "redactions"] }
mockito = "1.5.0"
tokio-util = { version = "0.7", features = ["rt"] }

# For examples
clap = { version = "4.5", features = ["derive"] }
env_logger = "0.11"
dashmap = "6.1"  # Already in main deps but needed for examples
pmcp-macros = { version = "0.5.0", path = "pmcp-macros" }  # For macro examples (s23_mcp_tool_macro)
pmcp-code-mode = { version = "0.3.0", path = "crates/pmcp-code-mode" }  # For code mode example (s41)
pmcp-code-mode-derive = { version = "0.2.0", path = "crates/pmcp-code-mode-derive" }  # For code mode example (s41)

[features]
default = ["logging"]
full = ["websocket", "http", "streamable-http", "sse", "validation", "resource-watcher", "rayon", "schema-generation", "jwt-auth", "composition", "mcp-apps", "http-client", "logging", "macros"]
composition = ["streamable-http"]
# MCP Apps Extension - Interactive UI support for ChatGPT Apps, MCP-UI, and standard MCP hosts
mcp-apps = []
jwt-auth = ["http-client", "dep:jsonwebtoken"]
http-client = ["dep:reqwest"]
logging = ["dep:tracing-subscriber"]
oauth = ["http-client", "dep:webbrowser", "dep:dirs", "dep:rand"]
sse = ["http-client", "dep:bytes"]
websocket = ["dep:tokio-tungstenite"]
http = ["dep:hyper", "dep:hyper-util", "dep:bytes"]
streamable-http = ["dep:hyper", "dep:hyper-util", "dep:hyper-rustls", "dep:rustls", "dep:futures-util", "dep:bytes", "dep:axum", "dep:tower", "dep:tower-http"]
validation = ["dep:jsonschema", "dep:garde"]
resource-watcher = ["dep:notify", "dep:glob-match"]
schema-generation = ["dep:schemars"]
macros = ["dep:pmcp-macros", "schema-generation"]
wasm = ["websocket-wasm", "uuid/js", "dep:futures-channel", "dep:futures-locks"]
websocket-wasm = []
wasm-tokio = []
wasi-http = []  # Future: WASI HTTP support (not yet implemented)

# Example features
authentication_example = []
cancellation_example = []
progress_example = []

# Performance optimizations
unstable = []
simd = []
rayon = ["dep:rayon"]

# Testing support
test-helpers = []

[[bench]]
name = "simple_test"
harness = false

[[bench]]
name = "json_performance"
harness = false

[[bench]]
name = "protocol_serialization"
harness = false

[[bench]]
name = "transport_performance"
