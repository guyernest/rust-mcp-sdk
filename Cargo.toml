features = [
    "composition",
    "http",
    "http-client",
    "jwt-auth",
    "macros",
    "mcp-apps",
    "oauth",
    "rayon",
    "resource-watcher",
    "schema-generation",
    "simd",
    "sse",
    "streamable-http",
    "validation",
    "websocket",
]
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
