# Unified gate — aggregates required CI checks into a single status
# Required by paiml org ruleset "Green Main — unified gate enforcement"
name: unified

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    needs: []
    # Run even if upstream jobs were skipped; fail if any upstream failed
    if: always()
    steps:
      - name: Check CI workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              per_page: 100,
            });

            const required = ['Test', 'Quality Gate'];
            const results = [];

            for (const name of required) {
              const run = checkRuns.check_runs
                .filter(r => r.name === name)
                .sort((a, b) => new Date(b.started_at) - new Date(a.started_at))[0];

              if (!run) {
                results.push({ name, status: 'missing' });
              } else if (run.conclusion === 'success') {
                results.push({ name, status: 'passed' });
              } else {
                results.push({ name, status: run.conclusion || run.status });
              }
            }

            console.log('Required check results:');
            for (const r of results) {
              console.log(`  ${r.status === 'passed' ? '✅' : '❌'} ${r.name}: ${r.status}`);
            }

            const failed = results.filter(r => r.status !== 'passed');
            if (failed.length > 0) {
              core.setFailed(`${failed.length} required check(s) did not pass`);
            }
