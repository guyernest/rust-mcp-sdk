# .github/workflows/release-preview.yml
name: Release Preview Binary

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (leave empty for latest)'
        required: false
        type: string

jobs:
  build-release:
    name: Build and Release Preview
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: mcp-preview-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: mcp-preview-aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: mcp-preview-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: mcp-preview-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: mcp-preview-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: cargo build --release --package mcp-preview --target ${{ matrix.target }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          fi
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      - name: Prepare artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv mcp-preview.exe "${{ matrix.asset_name }}"
          else
            mv mcp-preview "${{ matrix.asset_name }}"
          fi

      - name: Generate checksum
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi

      - name: Upload binary and checksum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.TAG_NAME }}" \
            "target/${{ matrix.target }}/release/${{ matrix.asset_name }}" \
            "target/${{ matrix.target }}/release/${{ matrix.asset_name }}.sha256" \
            --clobber
