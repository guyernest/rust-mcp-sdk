# Audit configuration for cargo-audit
# https://docs.rs/cargo-audit/latest/cargo_audit/

[advisories]
# Advisories in transitive dependencies we don't directly control. The AWS SDK
# chain block is grouped first (pulled in by aws-smithy-http-client, aws-lc-sys,
# and rustls 0.21; tracking: waiting for the AWS SDK to update to rustls 0.23+ and
# a patched aws-lc-sys). Advisories from optional SQL backend connectors follow at
# the end.

ignore = [
    # rustls-webpki 0.101.7: CRL Distribution Point matching logic error
    # Path: aws-smithy-http-client -> rustls 0.21 -> rustls-webpki 0.101
    "RUSTSEC-2026-0049",

    # rustls-webpki 0.101.7: Name constraints for URI names incorrectly accepted
    # Path: aws-smithy-http-client -> rustls 0.21 -> rustls-webpki 0.101
    "RUSTSEC-2026-0098",

    # rustls-webpki 0.101.7: Name constraints accepted for wildcard certificates
    # Path: aws-smithy-http-client -> rustls 0.21 -> rustls-webpki 0.101
    "RUSTSEC-2026-0099",

    # rustls-webpki 0.101.7: Reachable panic in CRL parsing
    # Path: aws-smithy-http-client -> rustls 0.21 -> rustls-webpki 0.101
    # Published 2026-04-22; same transitive-dep constraint as the sibling
    # RUSTSEC-2026-0049/0098/0099 entries above.
    "RUSTSEC-2026-0104",

    # aws-lc-sys: Timing side-channel in AES-CCM tag verification
    "RUSTSEC-2026-0045",

    # aws-lc-sys: X.509 Name Constraints bypass via wildcard/Unicode CN
    "RUSTSEC-2026-0044",

    # aws-lc-sys: CRL Distribution Point scope check logic error
    "RUSTSEC-2026-0048",

    # aws-lc-sys: PKCS7_verify signature validation bypass
    "RUSTSEC-2026-0047",

    # aws-lc-sys: PKCS7_verify certificate chain validation bypass
    "RUSTSEC-2026-0046",

    # rsa 0.9.10: Marvin Attack — potential key recovery via timing sidechannels.
    # No fixed upgrade is available (the `rsa` crate has no patched release).
    # Path: pmcp-toolkit-mysql -> sqlx-mysql 0.8.6 -> rsa (used only by the MySQL
    # caching_sha2_password / sha256_password auth handshake on the OPTIONAL mysql
    # connector). Low practical risk for the connector's use; tracking an upstream
    # `rsa` fix or a sqlx-mysql path that avoids it.
    "RUSTSEC-2023-0071",
]
