# Cargo configuration for PMCP

[target.wasm32-unknown-unknown]
runner = "wasm-bindgen-test-runner"

# Build optimizations for WASM
[target.'cfg(target_arch = "wasm32")']
rustflags = [
    "-C", "opt-level=z",     # Optimize for size
    # LTO is handled in individual Cargo.toml files to avoid issues with dependencies
]

# Note: `target-cpu=native` was previously set here as a build-optimization
# default. It was removed because it also applies to proc-macro builds, and
# GitHub Actions runners SIGILL when rustc dlopens a proc-macro compiled with
# instructions the runner CPU doesn't actually support (see PR #256).
# Downstream consumers get host-default codegen anyway; the optimization only
# helped binaries run locally on the developer's own machine. If you want it
# back for a specific local benchmark, set `RUSTFLAGS="-C target-cpu=native"`
# in your shell.

[alias]
# Convenient aliases for WASM builds
wasm-build = "build --target wasm32-unknown-unknown --features wasm"
wasm-test = "test --target wasm32-unknown-unknown --features wasm"
wasm-check = "check --target wasm32-unknown-unknown --features wasm"

# For building the WASM package
wasm-pack = "run --package wasm-pack-helper --"
