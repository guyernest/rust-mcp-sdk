# Phase 79 Wave 1 reference fixture: 6 base sections + [post_deploy_tests]
# with documented defaults + on_failure = "fail" (the documented default).

[target]
type = "pmcp-run"
version = "1.0"

[aws]
region = "us-west-2"

[server]
name = "cost-coach"
memory_mb = 512
timeout_seconds = 30

[environment]
RUST_LOG = "info"

[auth]
enabled = false
provider = "none"

[observability]
log_retention_days = 30
enable_xray = true
create_dashboard = true

[post_deploy_tests]
enabled = true
checks = ["connectivity", "conformance", "apps"]
apps_mode = "claude-desktop"
on_failure = "fail"
timeout_seconds = 60
warmup_grace_ms = 2000
