# Phase 79 Wave 1 reference fixture: cost-coach-shaped IAM declarations PLUS
# the new [[widgets]] blocks. Mirrors `examples/fixtures/cost-coach.deploy.toml`
# byte-for-byte and APPENDS the widget pre-build sections.

[target]
type = "pmcp-run"
version = "1.0"

[aws]
region = "us-west-2"

[server]
name = "cost-coach"
memory_mb = 512
timeout_seconds = 30

[environment]
RUST_LOG = "info"

[auth]
enabled = false
provider = "none"

[observability]
log_retention_days = 30
enable_xray = true
create_dashboard = true

# DynamoDB: read + write on the tenants table AND its GSIs.
[[iam.tables]]
name = "cost-coach-tenants"
actions = ["readwrite"]
include_indexes = true

# S3: object-level RW on the snapshots bucket.
[[iam.buckets]]
name = "cost-coach-snapshots"
actions = ["readwrite"]

# Raw IAM: secretsmanager read under a narrow ARN prefix.
[[iam.statements]]
effect = "Allow"
actions = ["secretsmanager:GetSecretValue"]
resources = ["arn:aws:secretsmanager:us-west-2:*:secret:cost-coach/*"]

# Phase 79 widget pre-build: 2 widgets, both with explicit
# `embedded_in_crates` for cache invalidation. Cost-coach has the primary
# `widget/` dir embedded in the lambda crate plus an `widgets/admin` dir for
# admin-only views with a non-default output dir.
[[widgets]]
path = "widget"
embedded_in_crates = ["cost-coach-lambda"]

[[widgets]]
path = "widgets/admin"
output_dir = "build"
embedded_in_crates = ["cost-coach-admin-lambda"]
