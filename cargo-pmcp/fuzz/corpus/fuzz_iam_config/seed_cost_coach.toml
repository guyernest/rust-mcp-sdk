[target]
type = "pmcp-run"
version = "1.0"

[aws]
region = "us-west-2"

[server]
name = "cost-coach"
memory_mb = 512
timeout_seconds = 30

[environment]
RUST_LOG = "info"

[auth]
enabled = false
provider = "none"

[observability]
log_retention_days = 30
enable_xray = true
create_dashboard = true

[[iam.tables]]
name = "cost-coach-tenants"
actions = ["readwrite"]
include_indexes = true

[[iam.buckets]]
name = "cost-coach-snapshots"
actions = ["readwrite"]

[[iam.statements]]
effect = "Allow"
actions = ["secretsmanager:GetSecretValue"]
resources = ["arn:aws:secretsmanager:us-west-2:*:secret:cost-coach/*"]
