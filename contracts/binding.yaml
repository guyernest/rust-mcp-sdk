# === Protocol Version Negotiation ===
- contract: mcp-protocol-sdk-v1.yaml
  equation: protocol_version_negotiation
  function: negotiate_protocol_version
  module_path: pmcp::types::protocol::version
  signature: 'pub fn negotiate_protocol_version(client_version: &str) -> &str'
  status: implemented
  notes: >-
    Returns client_version if in SUPPORTED_PROTOCOL_VERSIONS, else LATEST_PROTOCOL_VERSION.
    4 supported versions: 2025-11-25, 2025-06-18, 2025-03-26, 2024-11-05
- contract: mcp-protocol-sdk-v1.yaml
  equation: protocol_version_negotiation
  function: SUPPORTED_PROTOCOL_VERSIONS
  module_path: pmcp::types::protocol::version
  signature: "pub const SUPPORTED_PROTOCOL_VERSIONS: &[&str]"
  status: implemented
  notes: 4-element array of supported MCP protocol version date strings

