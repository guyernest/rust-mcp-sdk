# === Toolkit Core (Phase 83) ===
# Per Phase 83 review R3, every D-15-headline `module_path` is the CRATE-ROOT
# form (e.g. `pmcp_server_toolkit::AuthProvider`), aligning with the headline
# DX promise of "one crate-root import line is enough". The submodule paths
# still exist internally and remain valid (compatibility); the canonical
# surface for contracts is the crate root.
#
# Per Phase 83 Plan 09 Task 2 sub-step 2b, every row uses the concrete
# `Result<T, ToolkitError>` form consistently (not the `Result<T>` alias) so
# contract validators see explicit error types.
#
# Power-user surfaces (`pmcp_server_toolkit::tools::synthesize_from_config`,
# `pmcp_server_toolkit::code_mode::*`) keep their submodule paths where the
# symbol genuinely lives below the crate root by design.

