[package]
name = "web-channel-client"
version = "0.1.0"
edition = "2021"
description = "Browser WASM MCP client reference: OAuth browser-PKCE + MCP Tasks over Fetch (Phase 103 example)."
license = "MIT"
repository = "https://github.com/paiml/pmcp"
keywords = ["mcp", "wasm", "oauth", "pkce", "tasks"]
categories = ["wasm", "web-programming", "api-bindings"]
publish = false

[package.metadata.wasm-pack]
wasm-opt = false

[lib]
crate-type = ["cdylib"]

# HIGH-2 package split: this wasm cdylib takes pmcp with ONLY the `wasm` feature
# (NOT http/streamable-http) so the build pulls NO native HTTP stack
# (hyper/tokio/axum). The native demo server is the SEPARATE crate at ../server.
[dependencies]
pmcp = { path = "../../..", default-features = false, features = ["wasm"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"
tracing-wasm = "0.2"
web-sys = { version = "0.3", features = [
    "console",
    "WebSocket",
    "Window",
    "Storage",
    "Location",
    "Url",
    "UrlSearchParams",
    "Headers",
    "Request",
    "RequestInit",
    "Response",
] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
