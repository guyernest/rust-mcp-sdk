<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Widget Preview</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #eee;
            min-height: 100vh;
        }
        .dev-toolbar {
            background: #1a1a2e;
            padding: 12px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .dev-toolbar h1 {
            font-size: 14px;
            font-weight: 500;
            color: #888;
        }
        .dev-toolbar .badge {
            background: #4a90d9;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .dev-toolbar .log-toggle {
            margin-left: auto;
            background: #333;
            border: none;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .dev-toolbar .log-toggle:hover { background: #444; }
        .container {
            display: flex;
            height: calc(100vh - 50px);
        }
        .widget-frame {
            flex: 1;
            border: none;
        }
        .dev-panel {
            width: 350px;
            background: #16213e;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }
        .dev-panel.collapsed { width: 0; overflow: hidden; }
        .dev-panel h2 {
            font-size: 12px;
            color: #888;
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .log-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .log-entry {
            background: #0f3460;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .log-entry .tool-name {
            color: #4a90d9;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .log-entry .args {
            color: #888;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 10px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
        .log-entry .result {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #333;
            color: #6c6;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 10px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
        .log-entry.error .result { color: #f66; }
        .clear-btn {
            margin: 8px;
            padding: 8px;
            background: #333;
            border: none;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .clear-btn:hover { background: #444; }
    </style>
</head>
<body>
    <div class="dev-toolbar">
        <h1>PMCP Widget Preview</h1>
        <span class="badge">DEV MODE</span>
        <button class="log-toggle" onclick="togglePanel()">Toggle Logs</button>
    </div>

    <div class="container">
        <iframe id="widget" class="widget-frame" src="widget/board.html"></iframe>

        <div id="devPanel" class="dev-panel">
            <h2>Tool Calls</h2>
            <div id="logList" class="log-list"></div>
            <button class="clear-btn" onclick="clearLogs()">Clear Logs</button>
        </div>
    </div>

    <script>
        const logList = document.getElementById('logList');
        const devPanel = document.getElementById('devPanel');
        const widgetFrame = document.getElementById('widget');

        function togglePanel() {
            devPanel.classList.toggle('collapsed');
        }

        function clearLogs() {
            logList.innerHTML = '';
        }

        function addLog(toolName, args, result, isError = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' error' : '');
            entry.innerHTML = `
                <div class="tool-name">${toolName}</div>
                <div class="args">${JSON.stringify(args, null, 2)}</div>
                <div class="result">${JSON.stringify(result, null, 2)}</div>
            `;
            logList.insertBefore(entry, logList.firstChild);
        }

        // Initial game state
        function createInitialState() {
            const board = [];
            // Empty board
            for (let rank = 0; rank < 8; rank++) {
                board[rank] = [];
                for (let file = 0; file < 8; file++) {
                    board[rank][file] = null;
                }
            }

            // White pieces
            const backRow = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
            for (let i = 0; i < 8; i++) {
                board[0][i] = { type: backRow[i], color: 'white' };
                board[1][i] = { type: 'pawn', color: 'white' };
                board[6][i] = { type: 'pawn', color: 'black' };
                board[7][i] = { type: backRow[i], color: 'black' };
            }

            return {
                board,
                turn: 'white',
                history: [],
                castling: {
                    white_kingside: true,
                    white_queenside: true,
                    black_kingside: true,
                    black_queenside: true
                },
                en_passant: null,
                status: 'inprogress'
            };
        }

        // Simple move validation
        function isValidMove(state, from, to) {
            const piece = state.board[from.rank]?.[from.file];
            if (!piece) return false;
            if (piece.color !== state.turn) return false;

            const target = state.board[to.rank]?.[to.file];
            if (target && target.color === piece.color) return false;

            const dx = Math.abs(to.file - from.file);
            const dy = Math.abs(to.rank - from.rank);
            const direction = piece.color === 'white' ? 1 : -1;

            switch (piece.type) {
                case 'king': return dx <= 1 && dy <= 1;
                case 'queen': return dx === 0 || dy === 0 || dx === dy;
                case 'rook': return dx === 0 || dy === 0;
                case 'bishop': return dx === dy;
                case 'knight': return (dx === 2 && dy === 1) || (dx === 1 && dy === 2);
                case 'pawn':
                    const startRank = piece.color === 'white' ? 1 : 6;
                    const moveDir = to.rank - from.rank;
                    if (dx === 0 && !target) {
                        if (moveDir === direction) return true;
                        if (from.rank === startRank && moveDir === 2 * direction) return true;
                    }
                    if (dx === 1 && moveDir === direction && target) return true;
                    return false;
            }
            return false;
        }

        function getValidMoves(state, pos) {
            const moves = [];
            for (let rank = 0; rank < 8; rank++) {
                for (let file = 0; file < 8; file++) {
                    if (isValidMove(state, pos, { rank, file })) {
                        moves.push(String.fromCharCode(97 + file) + (rank + 1));
                    }
                }
            }
            return moves;
        }

        function applyMove(state, from, to) {
            const newState = JSON.parse(JSON.stringify(state));
            const piece = newState.board[from.rank][from.file];
            newState.board[from.rank][from.file] = null;
            newState.board[to.rank][to.file] = piece;
            newState.turn = state.turn === 'white' ? 'black' : 'white';
            newState.history.push(
                String.fromCharCode(97 + from.file) + (from.rank + 1) +
                String.fromCharCode(97 + to.file) + (to.rank + 1)
            );
            return newState;
        }

        function parsePosition(str) {
            const file = str.charCodeAt(0) - 97;
            const rank = parseInt(str[1]) - 1;
            return { file, rank };
        }

        // Mock MCP bridge
        widgetFrame.onload = () => {
            const widgetWindow = widgetFrame.contentWindow;

            widgetWindow.mcpBridge = {
                callTool: async (name, args) => {
                    let result;
                    let isError = false;

                    try {
                        switch (name) {
                            case 'chess_new_game':
                                result = createInitialState();
                                break;

                            case 'chess_move':
                                const moveStr = args.move.replace(/[-\s]/g, '');
                                if (moveStr.length !== 4) {
                                    result = { success: false, error: 'Invalid move format' };
                                    isError = true;
                                    break;
                                }
                                const from = parsePosition(moveStr.slice(0, 2));
                                const to = parsePosition(moveStr.slice(2, 4));

                                if (!isValidMove(args.state, from, to)) {
                                    result = { success: false, error: 'Invalid move' };
                                    isError = true;
                                    break;
                                }

                                const newState = applyMove(args.state, from, to);
                                result = {
                                    success: true,
                                    state: newState,
                                    move: moveStr,
                                    message: `Move ${moveStr} applied. It's now ${newState.turn}'s turn.`
                                };
                                break;

                            case 'chess_valid_moves':
                                const pos = parsePosition(args.position);
                                result = {
                                    position: args.position,
                                    moves: getValidMoves(args.state, pos)
                                };
                                break;

                            default:
                                result = { error: `Unknown tool: ${name}` };
                                isError = true;
                        }
                    } catch (e) {
                        result = { error: e.message };
                        isError = true;
                    }

                    addLog(name, args, result, isError);
                    return result;
                },

                getState: () => {
                    const saved = localStorage.getItem('chess_state');
                    return saved ? JSON.parse(saved) : {};
                },

                setState: (state) => {
                    localStorage.setItem('chess_state', JSON.stringify(state));
                }
            };

            // Notify widget that bridge is ready
            widgetWindow.dispatchEvent(new Event('mcpBridgeReady'));
        };
    </script>
</body>
</html>
